# This patch provides additional arguments to the controller manager to
# enable integration with dnsnameresolver coredns plugin.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--leader-elect"
        - --coredns-namespace=openshift-dns
        - --coredns-service-name=dns-default
        - --dns-name-resolver-namespace=openshift-ovn-kubernetes
        - --coredns-port=5353
